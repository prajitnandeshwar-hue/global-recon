function TopNav({page,setPage,isFirstRun,onShowOnboarding,businessId,setBusinessId,period,setPeriod,onOpenPeriodModal}){
  const titles={mitigate:"Mitigate Risks", report:"Report Taxes", govern:"Govern Taxes", artifacts:"Records", agents:"Agents", exceptions:"Exceptions"};
  const [hintVisible,setHintVisible]=useState(isFirstRun);
  const [bizOpen,setBizOpen]=useState(false);
  const [bizQuery,setBizQuery]=useState("");
  const bizRef=useRef(null);
  useEffect(()=>{
    if(!isFirstRun){setHintVisible(false);return;}
    const t=setTimeout(()=>setHintVisible(false),30000);
    return ()=>clearTimeout(t);
  },[isFirstRun]);
  // Close the business dropdown on outside click
  useEffect(()=>{
    const handler=(e)=>{
      if(bizRef.current&&!bizRef.current.contains(e.target)) setBizOpen(false);
    };
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[]);
  const currentBiz=BUSINESSES.find(b=>b.id===businessId)||BUSINESSES[0];
  const filteredBiz=BUSINESSES.filter(b=>{
    if(!bizQuery.trim()) return true;
    const q=bizQuery.toLowerCase();
    return b.name.toLowerCase().includes(q)||b.id.toLowerCase().includes(q)||b.type.toLowerCase().includes(q)||b.trn.toLowerCase().includes(q);
  });
  return (
    <div style={{height:48,background:C.white,borderBottom:`1px solid ${C.g200}`,display:"flex",alignItems:"center",padding:"0 20px",gap:14,flexShrink:0,position:"relative",zIndex:20}}>
      {/* Logo + breadcrumb */}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:24,height:24,borderRadius:6,background:`linear-gradient(135deg,${C.blueB},${C.navy})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:C.white}}>C</div>
        <span style={{fontSize:13,fontWeight:600,color:C.g900}}>Clear</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.g500}}>
        <span>/</span><span onClick={()=>setPage("landing")} style={{cursor:"pointer"}}>Clear Compliance Cloud</span>
        <span>/</span><span onClick={()=>setPage("mitigate")} style={{cursor:"pointer"}}>Global Recon</span>
        <span>/</span><span style={{color:C.blueM,fontWeight:500}}>{titles[page]||"Mitigate Risks"}</span>
      </div>
      <div style={{flex:1}}/>
      {/* Business selector */}
      <div ref={bizRef} style={{position:"relative"}}>
        <button onClick={()=>{setBizOpen(o=>!o);}} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:bizOpen?C.blueXXL:C.g100,borderRadius:6,fontSize:12,color:bizOpen?C.blueM:C.g700,fontWeight:500,border:bizOpen?`1px solid ${C.blueXL}`:`1px solid transparent`}}>
          <Ic.Building s={12} c={bizOpen?C.blueM:C.g500}/>
          <span>{currentBiz.short}</span>
          <Ic.ChevD s={12}/>
        </button>
        {bizOpen&&(
          <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,width:360,background:C.white,borderRadius:10,border:`1px solid ${C.g200}`,boxShadow:"0 8px 28px rgba(0,0,0,0.10)",zIndex:50,overflow:"hidden",animation:"fadeUp 0.15s"}}>
            <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.g100}`,display:"flex",alignItems:"center",gap:8,background:C.g50}}>
              <Ic.Search s={13}/>
              <input value={bizQuery} onChange={e=>setBizQuery(e.target.value)} autoFocus placeholder="Search entities by name, ID, or TRN" style={{flex:1,fontSize:12,background:"none",color:C.g900}}/>
            </div>
            <div style={{maxHeight:300,overflowY:"auto",padding:6}}>
              {filteredBiz.length===0&&<div style={{padding:"16px 12px",fontSize:11,color:C.g500,textAlign:"center"}}>No entities match "{bizQuery}"</div>}
              {filteredBiz.map(b=>{
                const isActive=b.id===businessId;
                return (
                  <button key={b.id} onClick={()=>{setBusinessId(b.id);setBizOpen(false);setBizQuery("");}}
                    style={{width:"100%",padding:"10px 12px",borderRadius:7,display:"flex",alignItems:"flex-start",gap:10,textAlign:"left",background:isActive?C.blueXXL:"transparent",marginBottom:2}}
                    onMouseEnter={e=>{if(!isActive) e.currentTarget.style.background=C.g50;}}
                    onMouseLeave={e=>{if(!isActive) e.currentTarget.style.background="transparent";}}>
                    <span style={{fontSize:14,marginTop:1}}>{b.flag}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:isActive?C.blueM:C.g900,marginBottom:2}}>{b.name}</div>
                      <div style={{fontSize:10,color:C.g500,lineHeight:1.5}}>{b.id} · {b.type} · {b.trn}</div>
                    </div>
                    {isActive&&<Ic.Check s={13} c={C.blueM}/>}
                  </button>
                );
              })}
            </div>
            <div style={{padding:"8px 12px",borderTop:`1px solid ${C.g100}`,fontSize:10,color:C.g400,background:C.g50}}>
              Switching changes the global context · {BUSINESSES.length} entities available
            </div>
          </div>
        )}
      </div>
      {/* Period selector — opens a side modal (slides in from the right) */}
      <button onClick={()=>{setBizOpen(false);if(onOpenPeriodModal) onOpenPeriodModal();}} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",background:C.g100,borderRadius:6,fontSize:12,color:C.g700,fontWeight:500,border:`1px solid transparent`}}>
        <Ic.Calendar s={12} c={C.g500}/>
        <span>{period}</span>
        <Ic.ChevR s={12}/>
      </button>
      {/* Jurisdiction badge (derived from selected business) */}
      <div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",background:C.g100,borderRadius:6,fontSize:12,color:C.g600,fontWeight:500}}>
        <span>{currentBiz.flag}</span><span>{currentBiz.jur}</span>
      </div>
      {/* Agent status chip with first-run hint */}
      <div style={{position:"relative"}}>
        <button onClick={isFirstRun?()=>{onShowOnboarding();setHintVisible(false);}:()=>setPage("agents")} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:`linear-gradient(135deg,${C.aiD},${C.aiM})`,borderRadius:6,fontSize:11,color:C.blueL,fontWeight:500,position:"relative"}}>
          <div style={{width:6,height:6,borderRadius:3,background:"#10B981",animation:"pulse 2s infinite"}}/>
          <Ic.Sparkle s={11} c={C.aiSpark}/>
          <span style={{color:C.white}}>VAT Recon Agent</span>
          <span style={{opacity:0.7}}>· ran 08:45 AM</span>
          {isFirstRun&&<div style={{position:"absolute",top:-2,right:-2,width:6,height:6,borderRadius:3,background:C.aiSpark,animation:"pulse 2s infinite",boxShadow:"0 0 6px rgba(167,139,250,0.7)"}}/>}
        </button>
        {isFirstRun&&hintVisible&&<div style={{position:"absolute",top:"calc(100% + 8px)",right:0,padding:"5px 10px",background:"rgba(167,139,250,0.12)",borderRadius:6,fontSize:10,color:C.aiSpark,fontWeight:500,whiteSpace:"nowrap",animation:"pulse 2s infinite",zIndex:20}}>
          Click to see what I did this morning
        </div>}
      </div>
      <button style={{position:"relative",padding:6}}>
        <Ic.Bell/>
        <div style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:3,background:C.red}}/>

// Map a {startMonth, endMonth} pair (YYYY-MM strings) to a canonical period label.
// Returns { period, monthCount, isQuarter }. Falls back to a free-form month range.
const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTH_SHORT=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const periodFromRange=(start,end)=>{
  if(!start||!end) return {period:null,monthCount:0,label:""};
  const [sy,sm]=start.split("-").map(Number);
  const [ey,em]=end.split("-").map(Number);
  const monthCount=(ey-sy)*12+(em-sm)+1;
  // Quarter detection: same year, month 1/4/7/10 → 3/6/9/12
  if(sy===ey&&monthCount===3){
    if(sm===1&&em===3) return {period:`Q1 ${sy}`,monthCount,label:`Q1 ${sy} · 3 months`};
    if(sm===4&&em===6) return {period:`Q2 ${sy}`,monthCount,label:`Q2 ${sy} · 3 months`};
    if(sm===7&&em===9) return {period:`Q3 ${sy}`,monthCount,label:`Q3 ${sy} · 3 months`};
    if(sm===10&&em===12) return {period:`Q4 ${sy}`,monthCount,label:`Q4 ${sy} · 3 months`};
  }
  if(sy===ey&&sm===1&&em===12) return {period:`FY ${sy}`,monthCount:12,label:`FY ${sy} · 12 months`};
  if(monthCount===1) return {period:`${MONTH_SHORT[sm-1]} ${sy}`,monthCount,label:`${MONTH_NAMES[sm-1]} ${sy} · 1 month`};
  return {period:`${MONTH_SHORT[sm-1]} ${sy} – ${MONTH_SHORT[em-1]} ${ey}`,monthCount,label:`${MONTH_SHORT[sm-1]} ${sy} – ${MONTH_SHORT[em-1]} ${ey} · ${monthCount} months`};
};
// Build a list of selectable months for the date pickers (last 24 months + next 6).
const MONTH_OPTIONS=(()=>{
  const opts=[];
  // Today is 2026-05-12 in the prototype; show Jan 2025 → Dec 2026.
  for(let y=2025;y<=2026;y++){
    for(let m=1;m<=12;m++){
      opts.push({v:`${y}-${String(m).padStart(2,"0")}`,l:`${MONTH_SHORT[m-1]} ${y}`});
    }
  }
  return opts;
})();
// Period → {start,end} for prefilling the date pickers from the current period state.
const rangeFromPeriod=(p)=>{
  const m=p.match(/^Q([1-4]) (\d{4})$/);
  if(m){const q=+m[1],y=+m[2];const sm=(q-1)*3+1;return {start:`${y}-${String(sm).padStart(2,"0")}`,end:`${y}-${String(sm+2).padStart(2,"0")}`};}
  const fy=p.match(/^FY (\d{4})$/);
  if(fy){const y=+fy[1];return {start:`${y}-01`,end:`${y}-12`};}
  return {start:"2026-01",end:"2026-03"};
};

            ))

// Opening messages for a fresh "New conversation" started by the user (NOT the initial
// recon load). The recon has already happened — we don't want to replay the streaming

  {r:"ai",t:"New conversation started. I have full context on this reconciliation — 72 documents, 63 exceptions, AED 130K at risk. Ask about any record, request changes, or trigger a re-run."}
];

// Default opening AI message + run-trail for a fresh chat thread on a populated recon.
const DEFAULT_POPULATED_MESSAGES=[
  {r:"ai",t:"Starting SR vs E-Invoice reconciliation for Jan 2026..."},
  {r:"ai",t:"Connected to SAP S/4HANA. Pulling Sales Register entries..."},
  {r:"ai",t:"59 SR documents fetched. Now querying FTA e-invoice portal..."},
  {r:"ai",t:"63 e-invoice records returned. Cross-matching now..."},

  {r:"ai",t:"Done. Total taxable value reconciled: AED 3.6M. Biggest issue: party detail mismatches."},
  {r:"ai",t:"I reconciled your UAE VAT data for January 2026 — Sales Register against E-Invoice records from the FTA portal. I found 55 mismatches, 4 exact matches, and 4 cases where a valid e-invoice exists but no GL entry. The biggest issue is party detail mismatches — 41 documents where customer master data doesn't align. Want me to walk through the issues, or are you looking for something specific?"}
];

function ReconReportView({type,initialState="populated",onClose,businessId,period,threadKey,chatThreads,setChatThreads,startNewConversation,recordRun,archivedConversations=[],openRecordsForConvo}){
  const [viewState,setViewState]=useState(initialState);
  // Messages live in App-level chatThreads (keyed by businessId__period__reconRunId).
  // On mount or when threadKey changes (e.g. user switches top-bar context, or starts
  // a new conversation), we hydrate from the store. On every messages change we sync back.
  const initialMessages=(chatThreads&&chatThreads[threadKey])||(initialState==="populated"?DEFAULT_POPULATED_MESSAGES:[]);
  const [messages,setMessages]=useState(initialMessages);
  // Reload messages when the active thread key changes (top-bar switch or new conversation).
  useEffect(()=>{
    if(!setChatThreads) return;
    const stored=chatThreads&&chatThreads[threadKey];
    setMessages(stored||(initialState==="populated"?DEFAULT_POPULATED_MESSAGES:[]));
  // eslint-disable-next-line
  },[threadKey]);
  // Persist messages back to the App-level store whenever they change.
  useEffect(()=>{
    if(!setChatThreads) return;
    setChatThreads(t=>({...t,[threadKey]:messages}));
  // eslint-disable-next-line
  },[messages]);
  const [input,setInput]=useState("");
  const [activeTab,setActiveTab]=useState("summary");
  const [showConvosList,setShowConvosList]=useState(false);
  // When set to an archived conversation id, the chat panel switches into a read-only
  // view of that archived thread. The active thread is preserved in state and restored
  // when the user clicks "Back to current conversation".
  const [viewingArchivedId,setViewingArchivedId]=useState(null);
  const viewingArchived=viewingArchivedId?archivedConversations.find(c=>c.id===viewingArchivedId):null;
  const displayedMessages=viewingArchived?viewingArchived.messages:messages;
  const [glFilter,setGlFilter]=useState("all");
  const [glSearch,setGlSearch]=useState("");
  // Document Detail filters
  const [docF,setDocF]=useState({ms:"all",sev:[],ss:[],parties:[],amtMin:null,amtMax:null,dateMin:"",dateMax:"",eInvSt:[],search:""});
  const [docSel,setDocSel]=useState(new Set());
  const [docSelected,setDocSelected]=useState(null);
  const [showDocFilters,setShowDocFilters]=useState(false);
  const docSecondaryCount=[docF.sev.length,docF.ss.length,docF.parties.length,docF.amtMin!==null?1:0,docF.amtMax!==null?1:0,docF.dateMin?1:0,docF.dateMax?1:0,docF.eInvSt.length].reduce((a,b)=>a+b,0);
  const filteredDocs=RECON_DOC_DATA.filter(d=>{
    if(docF.ms!=="all"&&d.ms!==docF.ms) return false;
    if(docF.sev.length&&!docF.sev.includes(d.sev)) return false;
    if(docF.ss.length&&!docF.ss.includes(d.ss)) return false;
    if(docF.parties.length&&!docF.parties.includes(d.srPN)) return false;
    if(docF.amtMin!==null&&d.srTV<docF.amtMin) return false;
    if(docF.amtMax!==null&&d.srTV>docF.amtMax) return false;
    if(docF.dateMin&&d.srDD<docF.dateMin) return false;
    if(docF.dateMax&&d.srDD>docF.dateMax) return false;
    if(docF.eInvSt.length&&!docF.eInvSt.includes(d.eSt||"(blank)")) return false;
    if(docF.search){const q=docF.search.toLowerCase();if(!d.dn.toLowerCase().includes(q)&&!d.srPN.toLowerCase().includes(q)&&!d.lhdn.toLowerCase().includes(q)) return false;}
    return true;
  });
  const toggleDocSel=(id)=>{const n=new Set(docSel);n.has(id)?n.delete(id):n.add(id);setDocSel(n);};
  const toggleAllDoc=()=>{if(filteredDocs.every(d=>docSel.has(d.dn))){const n=new Set(docSel);filteredDocs.forEach(d=>n.delete(d.dn));setDocSel(n);}else{const n=new Set(docSel);filteredDocs.forEach(d=>n.add(d.dn));setDocSel(n);}};
  const toggleMulti=(arr,val)=>arr.includes(val)?arr.filter(v=>v!==val):[...arr,val];
  // Line Detail filters
  const [lineF,setLineF]=useState({cls:"all",cc:[],dt:[],sev:[],ms:[],amtMin:null,amtMax:null,dateMin:"",dateMax:"",parties:[],search:""});
  const [lineSel,setLineSel]=useState(new Set());
  const [showLineFilters,setShowLineFilters]=useState(false);
  const lineSecondaryCount=[lineF.cc.length,lineF.dt.length,lineF.sev.length,lineF.ms.length,lineF.amtMin!==null?1:0,lineF.amtMax!==null?1:0,lineF.dateMin?1:0,lineF.dateMax?1:0,lineF.parties.length].reduce((a,b)=>a+b,0);
  const filteredLines=RECON_LINE_DATA.filter(l=>{
    if(lineF.cls!=="all"&&l.cls!==lineF.cls) return false;
    if(lineF.cc.length&&!lineF.cc.includes(l.cc)) return false;
    if(lineF.dt.length&&!lineF.dt.includes(l.dt)) return false;
    if(lineF.sev.length&&!lineF.sev.includes(l.sev)) return false;
    if(lineF.ms.length&&!lineF.ms.includes(l.ms)) return false;
    if(lineF.amtMin!==null&&l.dr<lineF.amtMin) return false;
    if(lineF.amtMax!==null&&l.dr>lineF.amtMax) return false;
    if(lineF.dateMin&&l.vd<lineF.dateMin) return false;
    if(lineF.dateMax&&l.vd>lineF.dateMax) return false;
    if(lineF.parties.length&&!lineF.parties.includes(l.pn)) return false;
    if(lineF.search){const q=lineF.search.toLowerCase();if(!l.gl.includes(q)&&!l.desc.toLowerCase().includes(q)&&!l.vn.includes(q)&&!l.dn.toLowerCase().includes(q)&&!l.pn.toLowerCase().includes(q)) return false;}
    return true;
  });
  const toggleLineSel=(id)=>{const n=new Set(lineSel);n.has(id)?n.delete(id):n.add(id);setLineSel(n);};
  const toggleAllLine=()=>{if(filteredLines.every((_,i)=>lineSel.has(i))){const n=new Set(lineSel);filteredLines.forEach((_,i)=>n.delete(i));setLineSel(n);}else{const n=new Set(lineSel);filteredLines.forEach((_,i)=>n.add(i));setLineSel(n);}};
  // Multi-select filter popover helper
  const FilterPopover=({items,selected,onToggle,label})=>(
    <div style={{marginBottom:12}}>
      <div style={{fontSize:10,fontWeight:600,color:C.g500,marginBottom:6}}>{label}</div>
      <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:140,overflowY:"auto"}}>
        {items.map(it=>(
          <label key={it.v} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.g700,cursor:"pointer",padding:"3px 0"}}>
            <input type="checkbox" checked={selected.includes(it.v)} onChange={()=>onToggle(it.v)} style={{cursor:"pointer"}}/>
            <span style={{flex:1}}>{it.v||"(blank)"}</span>
            <span style={{fontSize:10,color:C.g400}}>{it.c}</span>
          </label>
        ))}
      </div>
    </div>
  );
  // ---- Focused record ----
  const [focusedRecord,setFocusedRecord]=useState(null);
  const [focusedTab,setFocusedTab]=useState(null);
  const [quickChips,setQuickChips]=useState([]);
  const focusRow=(record,tab)=>{
    if(focusedRecord&&focusedRecord.dn===record.dn&&focusedTab===tab){setFocusedRecord(null);setFocusedTab(null);setQuickChips([]);return;}
    setFocusedRecord(record);setFocusedTab(tab);
  };
  // Clear focus on filter/tab change
  useEffect(()=>{setFocusedRecord(null);setFocusedTab(null);setQuickChips([]);},[activeTab,docF.ms,docSecondaryCount,lineF.cls,lineSecondaryCount]);

  // Proactive AI offer on focus
  const genProactive=(rec,tab)=>{
    if(!rec) return {text:"",chips:[]};
    if(tab==="document"){
      const d=rec;
      const diff=Math.abs(d.srTV-d.eTV);
      if(d.ms==="Mismatch"&&d.ss.includes("Value")){
        return {text:`I flagged this one because the taxable value in your ERP (AED ${d.srTV.toLocaleString()}) doesn't match the FTA portal (AED ${d.eTV.toLocaleString()}) \u2014 a difference of AED ${diff.toFixed(2)}. ${d.err?d.err+". ":""}Likely a ${d.srVAT>0?"VAT calculation":"rounding"} discrepancy on the supplier side. Want me to draft a correction request to ${d.srPN}?`,
          chips:["Yes, draft correction","Compare to similar records","View full detail"]};
      }
      if(d.ms==="Mismatch"&&d.ss.includes("Party")){
        return {text:`This one's flagged because ${d.srPN}'s details in your ERP don't match the e-invoice. ${d.err?`Specifically: "${d.err}" `:""}The TRN on file is ${d.eTIN==="Not registered"||d.eTIN==="NA"||d.eTIN==="0"?"not registered with FTA":d.eTIN}. Looks like a customer master sync issue. Want me to add it to the cleanup list?`,
          chips:["Add to fix list","Draft correction to supplier","View full detail"]};
      }
      if(d.ms==="Mismatch"&&d.ss.includes("Period")){
        return {text:`This document has an e-invoice ERROR status in the FTA portal but no matching GL entry for this period. ${d.err||"The e-invoice may have been submitted for a different period or classification."} This needs investigation to determine whether it's a timing issue or a classification error.`,
          chips:["Show similar period mismatches","Escalate to tax manager","View full detail"]};
      }
      if(d.ms.includes("Required")){
        return {text:`This is a ${d.srDT||"sales document"} for AED ${d.srTV.toLocaleString()} from ${d.srPN||d.eCN} on ${d.srDD||d.ePD}. It ${d.srP?"exists in your GL":"appears in the FTA portal"} but ${d.srP?"hasn't been submitted to FTA":"has no GL entry"} \u2014 and it should be, since this is a registered counterparty. ${d.srP?"Likely the e-invoice hasn't been submitted yet.":"The GL posting may be missing or delayed."}`,
          chips:["Send reminder to supplier","Escalate to tax manager","View full detail"]};
      }
      if(d.ms.includes("Not Required")){
        return {text:`This one's clean from a compliance standpoint. It's a "${d.ss}" entry \u2014 ${d.ss.includes("Pre-Mandate")?"this transaction predates the mandatory e-invoice start date, so no submission is required.":d.ss.includes("Non-Trade")?"this is a non-trade GL entry that doesn't require an e-invoice.":"no e-invoice action needed."} No action required.`,
          chips:["View full detail"]};
      }
      if(d.ms==="Exact Match"){
        return {text:`This one's clean. SR and e-invoice match exactly: AED ${d.srTV.toLocaleString()} taxable${d.srVAT?", AED "+d.srVAT.toLocaleString()+" VAT":""}. ${d.eSt==="VALID"||d.eSt==="SUBMITTED"?"Successfully submitted to FTA.":"Status: "+(d.eSt||"pending")+"."}${d.ePD?" Posted "+d.ePD+".":""} Nothing to do here.`,
          chips:["View full detail"]};
      }
      return {text:`Document ${d.dn} from ${d.srPN||d.eCN||"unknown party"}, AED ${(d.srTV||d.eTV||0).toLocaleString()}. Status: ${d.ms}. ${d.err||d.action||"Let me know what you'd like to investigate."}`,chips:["View full detail"]};
    }
    if(tab==="line"){
      const l=rec;
      const parentDoc=RECON_DOC_DATA.find(d=>d.dn===l.dn);
      const parentStatus=parentDoc?parentDoc.ms:"unknown";
      if(l.cls==="VAT_OUTPUT"){
        return {text:`This is a VAT output line for AED ${(l.dr||l.cr).toLocaleString()} on document ${l.dn} (${l.pn}). It's the VAT portion of a sales transaction. The parent document was flagged as "${parentStatus}"${parentDoc?" \u2014 "+parentDoc.action:""}.`,
          chips:["Show all lines in this document","View parent document","Draft correction"]};
      }
      if(l.cls==="REVENUE"){
        return {text:`This is a revenue line for AED ${(l.dr||l.cr).toLocaleString()} on document ${l.dn} (${l.pn}), GL ${l.gl} "${l.desc}". The parent transaction was flagged as "${parentStatus}"${parentDoc?" \u2014 "+parentDoc.action:""}.`,
          chips:["Show all lines in this document","View parent document"]};
      }
      if(l.cls==="UNCLASSIFIED"){
        return {text:`This GL line is on document ${l.dn} but classified as UNCLASSIFIED \u2014 we couldn't auto-categorize whether it's revenue, VAT, or something else. GL ${l.gl} "${l.desc}" for AED ${(l.dr||l.cr).toLocaleString()}. This often happens with new GL codes that haven't been mapped yet.`,
          chips:["Suggest classification","Show similar lines","View parent document"]};
      }
      return {text:`GL line on document ${l.dn}: ${l.desc} (${l.gl}), AED ${(l.dr||l.cr).toLocaleString()}. Classification: ${l.cls||"none"}. Parent doc status: ${parentStatus}.`,chips:["View parent document","Show all lines in this document"]};
    }
    return {text:"",chips:[]};
  };
  // Fire proactive offer when focus changes
  useEffect(()=>{
    if(!focusedRecord||isStreaming) return;
    const timer=setTimeout(()=>{
      const {text,chips}=genProactive(focusedRecord,focusedTab);
      if(!text) return;
      setQuickChips(chips);
      streamResponse(text);
    },300);
    return ()=>clearTimeout(timer);
  },[focusedRecord]);

  // ---- Scope awareness ----
  const scopeDesc=()=>{
    if(focusedRecord){
      if(focusedTab==="document"){const d=focusedRecord;return {tab:"Document Detail",count:1,desc:`${d.dn} \u00B7 ${d.srPN||d.eCN} \u00B7 AED ${(d.srTV||0).toLocaleString()}`,isSel:false,isFocus:true};}
      if(focusedTab==="line"){const l=focusedRecord;return {tab:"Line Detail",count:1,desc:`GL line \u00B7 AED ${(l.dr||l.cr||0).toLocaleString()} \u00B7 doc ${l.dn}`,isSel:false,isFocus:true};}
    }
    if(activeTab==="summary") return {tab:"Summary",count:null,desc:"viewing summary",isSel:false};
    if(activeTab==="gl") return {tab:"GL Trial Balance",count:null,desc:"viewing GL trial balance",isSel:false};
    if(activeTab==="document"){
      if(docSel.size>0) return {tab:"Document Detail",count:docSel.size,desc:`${docSel.size} selected document${docSel.size!==1?"s":""}`,isSel:true};
      const fc=(docF.ms!=="all"?1:0)+docSecondaryCount;
      return {tab:"Document Detail",count:filteredDocs.length,desc:fc>0?`${filteredDocs.length} document${filteredDocs.length!==1?"s":""} · ${fc} filter${fc!==1?"s":""}`:`all ${RECON_DOC_DATA.length} documents`,isSel:false};
    }
    if(activeTab==="line"){
      if(lineSel.size>0) return {tab:"Line Detail",count:lineSel.size,desc:`${lineSel.size} selected line${lineSel.size!==1?"s":""}`,isSel:true};
      const fc=(lineF.cls!=="all"?1:0)+lineSecondaryCount;
      return {tab:"Line Detail",count:filteredLines.length,desc:fc>0?`${filteredLines.length} line${filteredLines.length!==1?"s":""} · ${fc} filter${fc!==1?"s":""}`:`all ${RECON_LINE_DATA.length} GL line entries`,isSel:false};
    }
    return {tab:activeTab,count:null,desc:"",isSel:false};
  };
  const scope=scopeDesc();

  // Top suppliers from in-scope docs
  const topScopeSuppliers=()=>{
    const src=docSel.size>0?RECON_DOC_DATA.filter(d=>docSel.has(d.dn)):filteredDocs;
    const counts={};src.forEach(d=>{counts[d.srPN]=(counts[d.srPN]||0)+1;});
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,4);
  };

// Scope pulse
  const [scopePulse,setScopePulse]=useState(false);
  const scopeInit=useRef(true);
  useEffect(()=>{
    if(scopeInit.current){scopeInit.current=false;return;}
    setScopePulse(true);
    const t=setTimeout(()=>setScopePulse(false),500);
    return ()=>clearTimeout(t);
  },[scope.desc]);

  // Correction & re-run state
  const [rules,setRules]=useState([]);
  const [auditTrail,setAuditTrail]=useState([]);
  const [pendingCorrection,setPendingCorrection]=useState(null);
  const [comparisonBanner,setComparisonBanner]=useState(null);
  const [showAuditTrail,setShowAuditTrail]=useState(false);
  const [isRegenerating,setIsRegenerating]=useState(false);

  const detectCorrectionIntent=(q)=>{
    if(q.match(/wrong entity|wrong company|ran.*on.*wrong/)) return {type:"data_source",sub:"entity"};
    if(q.match(/stale|outdated|old data|re.?pull|fresh data|uploaded/)) return {type:"data_source",sub:"refresh"};
    if(q.match(/missing supplier|missing data|should include/)) return {type:"data_source",sub:"missing"};
    if(q.match(/tolerance|threshold/)) return {type:"rule",sub:"tolerance"};
    if(q.match(/should.*flag|shouldn.*flag|too strict|too loose|matching.*wrong/)) return {type:"rule",sub:"matching"};
    if(q.match(/treat as|classify as|consider this|rule.*should/)) return {type:"rule",sub:"classify"};
    if(q.match(/exclude.*test|test transaction|skip.*test/)) return {type:"scope",sub:"exclude_test"};
    if(q.match(/exclude|skip.*(?:subsidiary|branch)/)) return {type:"scope",sub:"exclude"};
    if(q.match(/include|add the/)) return {type:"scope",sub:"include"};
    return null;
  };

  const runRegeneration=(changes,duration)=>{
    setIsRegenerating(true);
    const stages=duration>20000?
      ["Connecting to SAP...","Pulling fresh records...","Re-running reconciliation...","Classifying exceptions...","Finalizing..."]:
      ["Applying new rules...","Re-classifying records...","Updating exception buckets...","Finalizing..."];
    let idx=0;
    const perStage=duration/stages.length;
    const advanceStage=()=>{
      if(idx<stages.length){
        setMessages(m=>[...m,{r:"sys",t:stages[idx]}]);
        idx++;
        setTimeout(advanceStage,perStage);
      } else {
        setIsRegenerating(false);
        setPendingCorrection(null);
        const summary=changes.map(c=>c.desc).join(", ");
        const delta=Math.floor(Math.random()*12)+3;
        const banner={summary,delta,reclassified:delta,riskChange:delta*700};
        setComparisonBanner(banner);
        setTimeout(()=>setComparisonBanner(null),60000);
        const entry={id:Date.now().toString(),timestamp:new Date().toISOString(),user:"You",type:changes[0].type,action:summary,affectedPeriod:"Jan 2026",reason:null};
        setAuditTrail(prev=>[entry,...prev]);
        // Inline system event in the chat thread \u2014 the conversation continues below it
        // so the user can scroll up and see when each re-run happened in context.
        const now=new Date();
        const timeLabel=now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
        const riskAmt=delta*700;
        const summarySentence=`${delta} records reclassified \u00B7 AED ${(riskAmt/1000).toFixed(0)}K reduction in at-risk`;
        const runId=`run-${now.getTime()}`;
        setMessages(m=>[...m,{r:"rerun_event",id:runId,t:`Recon re-run completed at ${timeLabel}`,trigger:`Triggered by ${summary}`,summary:summarySentence,timestamp:now.toISOString()}]);
        // Record this run for the Records page run-history section.
        if(recordRun){
          const todayLabel=now.toLocaleDateString("en-US",{month:"short",day:"numeric"});
          recordRun({
            id:runId,
            at:now.toISOString(),
            label:"Recon re-run",
            time:`${timeLabel} \u00B7 ${todayLabel}`,
            kind:"rerun",
            summary:`Triggered by ${summary} \u00B7 ${summarySentence}`,
            chatKey:threadKey
          });
        }
        streamResponse(`Done. ${summary}. ${delta} records reclassified. Total at-risk ${Math.random()>0.5?"reduced":"adjusted"} by AED ${(delta*700).toLocaleString()}. A few things you might want to do next:`);
        chipsForNextMsg.current=[
          {l:"Save as permanent rule",f:{_saveRule:true}},
          {l:"Spot-check changed records",f:{_spotcheck:true}},
          {l:"Looks good \u00B7 freeze this run",f:{_freeze:true}}
        ];
      }
    };
    setTimeout(advanceStage,800);
  };

  // Streaming state
  const [isStreaming,setIsStreaming]=useState(false);
  const [streamingText,setStreamingText]=useState("");
  const [streamingDone,setStreamingDone]=useState(true);
  const msgsEndRef=useRef(null);
  const msgsContRef=useRef(null);
  const [atBottom,setAtBottom]=useState(true);
  const [showNewMsg,setShowNewMsg]=useState(false);

  const checkAtBottom=()=>{
    const el=msgsContRef.current;
    if(!el) return true;
    return (el.scrollTop+el.clientHeight)>=(el.scrollHeight-50);
  };
  const scrollToBottom=()=>{
    const el=msgsContRef.current;
    if(el) el.scrollTo({top:el.scrollHeight,behavior:"smooth"});
    setShowNewMsg(false);
  };

  // Auto-scroll on new messages
  useEffect(()=>{
    if(atBottom) scrollToBottom();
    else if(messages.length>0) setShowNewMsg(true);
  },[messages.length]);

  // Stream words with natural rhythm
  const streamResponse=(text)=>{
    setIsStreaming(true);
    setStreamingDone(false);
    setStreamingText("");
    const words=text.split(/(\s+)/);
    const totalWords=words.filter(w=>w.trim()).length;
    const fast=totalWords>150;
    let idx=0;
    let accumulated="";
    const revealNext=()=>{
      if(idx>=words.length){
        setIsStreaming(false);
        setStreamingDone(true);
        setStreamingText("");

  // Dynamic suggested questions — each set has at least one action

  // Action proposal state
  const [actionStatuses,setActionStatuses]=useState({});

  // Intent detection
  const detectIntent=(q)=>{

  };
  // ---- Chat-driven filtering ----
  const [aiSetFilters,setAiSetFilters]=useState([]);

  const parseFilterIntent=(msg)=>{
    const q=msg.toLowerCase();

    if(q.match(/(?:show|switch|go).*(?:line|lines)/)) return {type:"tab",tab:"line"};

    if(q.match(/(?:show|switch|go).*(?:document|doc detail)/)) return {type:"tab",tab:"document"};

    if(q.match(/^(clear|reset|show all|show every)/)) return {type:"clear"};

    if(q.match(/bad ones|problem ones/)&&!f.ms&&!f.sev) return {type:"ambiguous",question:"Want me to filter to high severity, or to mismatches specifically?",chips:[{l:"High severity only",f:{sev:["High","Critical"]}},{l:"All mismatches",f:{ms:"Mismatch"}},{l:"Critical issues only",f:{sev:["Critical"]}}]};
    if(q.match(/recent/)&&!q.match(/\d/)) return {type:"ambiguous",question:"How recent?",chips:[{l:"Last 3 days",f:{dateMin:"2026-01-28"}},{l:"Last 7 days",f:{dateMin:"2026-01-24"}},{l:"This whole month",f:{dateMin:"2026-01-01"}}]};

      // Try partial match for common short names
      const partials=[{k:"emirates",v:"Emirates Suppliers"},{k:"dubai imports",v:"Dubai Imports LLC"},{k:"apex",v:"Apex Logistics"},{k:"gamma",v:"Gamma Logistics"},{k:"global trade",v:"Global Trade FZE"},{k:"falah",v:"Al Falah Trading"},{k:"tech solutions",v:"Tech Solutions FZ"},{k:"falcon",v:"Falcon Industries"},{k:"bright",v:"Bright Holdings"},{k:"acme",v:"Acme Trading Co"},{k:"marina",v:"Marina Trade"},{k:"sunrise",v:"Sunrise Group"},{k:"continental",v:"Continental Co"},{k:"pacific",v:"Pacific Traders"}];

  const applyAiFilter=(filters)=>{

  const send=()=>{

    // Check for refinement of existing action — MUST run before filter intent
    const looksLikeRefinement2=isRefinement(ql)||(pendingAction&&pendingAction.status==="pending"&&(ql.match(/emirates|dubai|apex|gamma|global trade|falah|tech solutions|falcon|bright|acme|marina|sunrise|continental|pacific/)||ql.match(/high sev|critical|medium/)||ql.match(/over|under|above|below/)));

      const partyMatch2=ql.match(/(?:actually\s+)?(?:just|only|from)\s+(.+?)(?:\s*$)/);

      const refinedAction={...pendingAction,

    // Check for correction intent
    const ci=detectCorrectionIntent(ql);
    if(ci){
      setPendingCorrection({type:ci.type,sub:ci.sub,stage:"diagnosing",userIntent:q});
      if(ci.sub==="tolerance"){
        chipsForNextMsg.current=[{l:"AED 100",f:{_tolerance:100}},{l:"AED 250",f:{_tolerance:250}},{l:"AED 500",f:{_tolerance:500}},{l:"Custom value",f:{_tolerance:"custom"}}];
        streamResponse("The current matching tolerance is AED 50 \u2014 anything within that range matches cleanly. You're seeing mismatches that are probably rounding errors. What tolerance would you like to use?");
        return;
      }
      if(ci.sub==="entity"){
        chipsForNextMsg.current=[{l:"Tech Corp UAE Holdings (current)",f:{_entity:"TC-UAE-001"}},{l:"Tech Corp Trading FZE",f:{_entity:"TC-FZE-002"}},{l:"Pick a different entity",f:{_entity:"other"}}];
        streamResponse("Let me verify. I ran this against Tech Corp UAE Holdings (entity ID: TC-UAE-001). Did you mean to run against a different entity?");
        return;
      }
      if(ci.sub==="refresh"){
        chipsForNextMsg.current=[{l:"Re-pull from SAP now",f:{_refresh:true}},{l:"Cancel",f:{_cancelCorrection:true}}];
        streamResponse("The current data was fetched at 08:45 AM today. If your ERP team has uploaded fresh data since then, I can re-pull and re-run. Want me to re-fetch now?");
        return;
      }
      if(ci.sub==="exclude_test"){
        chipsForNextMsg.current=[{l:"Document Type prefix",f:{_excludeRule:"doctype"}},{l:"Document Number pattern",f:{_excludeRule:"docnum"}},{l:"Specific date range",f:{_excludeRule:"date"}}];
        streamResponse("I don't currently filter out test transactions. To do that, I'd need to know how you mark them. Looking at your records, I can see Document Type, Document Number, and Posting Date. Which distinguishes test transactions?");
        return;
      }
      if(ci.sub==="matching"||ci.sub==="classify"){
        streamResponse(`The current matching rules use exact comparison for amounts and party details, with a tolerance of AED 50. What would you like to change? For example: "increase tolerance to AED 250" or "treat ${ci.sub==="classify"?"these":"small differences"} as clean matches."`);
        return;
      }
      // Generic scope
      streamResponse("What specifically should I adjust in the scope? For example: exclude a subsidiary, add a date range, or filter to specific document types.");
      return;
    }

    // Check for filter intent
    const fi=parseFilterIntent(ql);
    if(fi){
      if(fi.type==="tab"){
        setActiveTab(fi.tab);
        streamResponse(`Switching to ${fi.tab==="gl"?"GL Trial Balance":fi.tab==="line"?"Line Detail":fi.tab==="summary"?"Summary":"Document Detail"}.`);
        return;
      }
      if(fi.type==="clear"){
        setDocF({ms:"all",sev:[],ss:[],parties:[],amtMin:null,amtMax:null,dateMin:"",dateMax:"",eInvSt:[],search:""});
        setAiSetFilters([]);
        streamResponse(`Filters cleared. Showing all ${RECON_DOC_DATA.length} documents.`);
        return;
      }
      if(fi.type==="clear_last"){
        if(aiSetFilters.length===0){streamResponse("No AI-set filters to clear. Want me to clear all filters instead?");return;}
        const last=aiSetFilters[aiSetFilters.length-1];
        setDocF(prev=>{
          const next={...prev};
          if(last.ms) next.ms="all";
          if(last.sev) next.sev=[];
          if(last.parties) next.parties=[];
          if(last.amtMin!==undefined) next.amtMin=null;
          if(last.amtMax!==undefined) next.amtMax=null;
          if(last.dateMin) next.dateMin="";
          if(last.dateMax) next.dateMax="";
          return next;
        });
        setAiSetFilters(prev=>prev.slice(0,-1));
        streamResponse("Removed the last filter. Let me know if you want to adjust further.");
        return;
      }
      if(fi.type==="ambiguous"){
        chipsForNextMsg.current=fi.chips;
        streamResponse(fi.question);
        return;
      }
      if(fi.type==="filter"){
        applyAiFilter(fi.filters);
        // Count will update on next render, estimate from current data
        const est=RECON_DOC_DATA.filter(d=>{
          if(fi.filters.ms&&d.ms!==fi.filters.ms) return false;
          if(fi.filters.sev&&!fi.filters.sev.includes(d.sev)) return false;
          if(fi.filters.parties&&!fi.filters.parties.includes(d.srPN)) return false;
          if(fi.filters.amtMin&&d.srTV<fi.filters.amtMin) return false;
          if(fi.filters.amtMax&&d.srTV>fi.filters.amtMax) return false;
          return true;
        }).length;
        streamResponse(`Filtering to ${fi.desc}. That gives me ${est} record${est!==1?"s":""} to look at. Want me to narrow further, or is this the right scope?`);
        return;
      }
    }

    // Check for action intent
    const intent=detectIntent(ql);
    if(intent){
      const proposal=buildProposal(intent);
      setPendingAction(proposal);
      actionForNextMsg.current=proposal;
      const intro=proposal.alreadyActioned>0
        ?`I'll ${proposal.title.toLowerCase()} for ${proposal.items.length} documents. Note: ${proposal.alreadyActioned} already have an action on them. Here's the plan — review, refine, or approve.`
        :`I'll ${proposal.title.toLowerCase()} for the ${scope.desc}. Here's the plan — review, refine through chat, or approve when ready.`;
      streamResponse(intro);
      return;
    }
    // Default response
    const resp=buildResponse(ql);
    streamResponse(resp);
  };

                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <div style={{width:20,height:20,borderRadius:6,background:entry.type==="rule"?C.blueXXL:entry.type==="one_time"?C.greenBg:C.amberBg,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {entry.type==="rule"?<Ic.Sparkle s={10} c={C.blueM}/>:entry.type==="one_time"?<Ic.Check s={10} c={C.green}/>:<Ic.Refresh s={10} c={C.amber}/>}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:11,fontWeight:600,color:C.g900}}>{entry.action}</div>
                          <div style={{fontSize:10,color:C.g500}}>{entry.affectedPeriod}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,fontSize:10,color:C.g400}}>
                        <span>{entry.user}</span>
                        <span>{new Date(entry.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
                        <span style={{padding:"1px 5px",borderRadius:4,background:entry.type==="rule"?C.blueXXL:C.g100,color:entry.type==="rule"?C.blueM:C.g600,fontWeight:500}}>{entry.type==="rule"?"Permanent rule":entry.type==="one_time"?"One-time":"Data change"}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {rules.length>0&&(
                <div style={{marginTop:20}}>
                  <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Active rules</div>
                  {rules.map((r,i)=>(
                    <div key={i} style={{padding:"10px 12px",background:C.blueXXL,borderRadius:6,border:`1px solid ${C.blueXL}`,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                      <Ic.Sparkle s={12} c={C.blueM}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:500,color:C.g900}}>{r.name}</div>
                        <div style={{fontSize:10,color:C.g500}}>Created {new Date(r.created).toLocaleDateString()}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      </>)}
    </div>
  );
}

function ExceptionDetailPanel({exception,onClose,onResolve}){
  if(!exception) return null;
  return (
    <div style={{position:"fixed",top:0,right:0,width:480,height:"100%",background:C.white,boxShadow:"-8px 0 24px rgba(0,0,0,0.08)",zIndex:50,display:"flex",flexDirection:"column",animation:"slideR 0.25s"}}>
      <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.g200}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:11,color:C.g500,marginBottom:2}}>Exception</div>
          <div style={{fontSize:14,fontWeight:600,color:C.g900}}>{exception.id}</div>
        </div>
        <button onClick={onClose} style={{padding:6}}><Ic.X/></button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
        {/* AI recommendation - top, before raw data */}
        <div style={{background:`linear-gradient(135deg,${C.aiD},${C.aiM})`,borderRadius:10,padding:"14px 16px",marginBottom:16,position:"relative",overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
            <Ic.Sparkle s={14}/>
            <span style={{fontSize:10,fontWeight:600,color:C.aiSpark,textTransform:"uppercase",letterSpacing:"0.06em"}}>AI Recommendation</span>
          </div>
          <div style={{fontSize:13,color:C.white,lineHeight:1.5,marginBottom:10}}>{exception.aiAction}</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>onResolve(exception,"approved")} style={{padding:"6px 12px",borderRadius:6,background:C.white,color:C.aiD,fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
              <Ic.Check s={11} c={C.aiD}/>Approve & send
            </button>
            <button style={{padding:"6px 12px",borderRadius:6,background:"rgba(255,255,255,0.12)",color:C.white,fontSize:11,fontWeight:500}}>Modify</button>
          </div>
        </div>

        {/* AI reason */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Why this happened</div>
          <div style={{fontSize:12,color:C.g700,lineHeight:1.6,padding:"10px 12px",background:C.g50,borderRadius:8,border:`1px solid ${C.g100}`}}>{exception.reason}</div>
        </div>

        {/* Invoice details */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Invoice details</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              {l:"Supplier",v:exception.sup},
              {l:"Type",v:exception.type},
              {l:"Amount at risk",v:exception.amt},
              {l:"Severity",v:exception.sev},
              {l:"Status",v:exception.status},
              {l:"Owner",v:exception.owner||"Unassigned"}
            ].map((d,i)=>(
              <div key={i} style={{padding:"8px 10px",background:C.g50,borderRadius:6,border:`1px solid ${C.g100}`}}>
                <div style={{fontSize:10,color:C.g500,marginBottom:2}}>{d.l}</div>
                <div style={{fontSize:12,fontWeight:500,color:C.g900}}>{d.v}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Manual actions */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Manual actions</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <button style={{padding:"8px 12px",borderRadius:6,border:`1px solid ${C.g200}`,fontSize:12,color:C.g700,textAlign:"left",background:C.white,display:"flex",alignItems:"center",gap:8}}>
              <Ic.User/><span>Assign to teammate</span>
            </button>
            <button style={{padding:"8px 12px",borderRadius:6,border:`1px solid ${C.g200}`,fontSize:12,color:C.g700,textAlign:"left",background:C.white,display:"flex",alignItems:"center",gap:8}}>
              <Ic.Flag/><span>Escalate to tax manager</span>
            </button>
            <button style={{padding:"8px 12px",borderRadius:6,border:`1px solid ${C.g200}`,fontSize:12,color:C.g700,textAlign:"left",background:C.white,display:"flex",alignItems:"center",gap:8}}>
              <Ic.Check s={12} c={C.green}/><span>Accept as variance</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ExceptionsPage({setPage}){
  const [filter,setFilter]=useState("all");
  const [selected,setSelected]=useState(null);
  const [bulkSelected,setBulkSelected]=useState(new Set());
  const [showBulkAI,setShowBulkAI]=useState(false);
  const filtered=EXCEPTIONS.filter(e=>filter==="all"?true:filter==="open"?e.status==="Open":filter==="high"?e.sev==="HIGH":true);

  const toggleBulk=(id)=>{
    const next=new Set(bulkSelected);
    next.has(id)?next.delete(id):next.add(id);
    setBulkSelected(next);
  };
  return (
    <div style={{flex:1,overflow:"auto",position:"relative"}}>
      <PageHeader title="Exceptions" count={63} subtitle="AI-prioritized by resolution urgency · Resolve before VAT201 filing in 8 days"
        actions={<>
          <button onClick={()=>setPage("mitigate")} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${C.g200}`,fontSize:12,color:C.g700,background:C.white,display:"flex",alignItems:"center",gap:5}}><Ic.ChevL/>Back to Mitigate</button>
          <button style={{padding:"6px 12px",borderRadius:6,fontSize:12,color:C.white,background:`linear-gradient(135deg,${C.blueB},${C.navy})`,display:"flex",alignItems:"center",gap:5,fontWeight:500}}><Ic.Download s={12} c={C.white}/>Export list</button>
        </>}/>

      {/* Filter row */}
      <div style={{padding:"16px 24px 12px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:6,background:C.white,border:`1px solid ${C.g200}`,minWidth:240}}>
          <Ic.Search/>
          <input placeholder="Search invoices, suppliers..." style={{flex:1,fontSize:12,color:C.g700,background:"none"}}/>
        </div>
        <div style={{display:"flex",gap:4}}>
          {[{k:"all",l:"All",n:63},{k:"open",l:"Open",n:9},{k:"high",l:"High severity",n:5}].map(f=>(
            <button key={f.k} onClick={()=>setFilter(f.k)} style={{padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:500,background:filter===f.k?C.blueXXL:C.white,color:filter===f.k?C.blueM:C.g600,border:`1px solid ${filter===f.k?C.blueXL:C.g200}`}}>
              {f.l} <span style={{opacity:0.7,marginLeft:3}}>{f.n}</span>
            </button>
          ))}
        </div>
        <div style={{flex:1}}/>
        {bulkSelected.size>0?(
          <button onClick={()=>setShowBulkAI(true)} style={{padding:"6px 14px",borderRadius:6,background:`linear-gradient(135deg,${C.aiD},${C.aiM})`,color:C.white,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
            <Ic.Sparkle s={12}/>AI Resolve {bulkSelected.size} exceptions
          </button>
        ):(
          <button style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${C.g200}`,fontSize:12,color:C.g700,background:C.white,display:"flex",alignItems:"center",gap:5}}><Ic.Filter/>More filters</button>
        )}
      </div>

      {/* AI sort indicator */}
      <div style={{margin:"0 24px 12px",padding:"8px 14px",borderRadius:8,background:C.blueBg,border:`1px solid ${C.blueXL}`,display:"flex",alignItems:"center",gap:8}}>
        <Ic.Sparkle s={12} c={C.aiM}/>
        <span style={{fontSize:11,color:C.blueM}}><strong>AI sort:</strong> Sorted by resolution priority — likely ITC impact + days to filing + supplier pattern. Top 5 should be resolved first.</span>
      </div>

      {/* Exception list */}
      <div style={{margin:"0 24px",background:C.white,borderRadius:10,border:`1px solid ${C.g200}`,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"32px 130px 1fr 130px 1fr 100px 80px 90px 90px",padding:"10px 14px",fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.05em",borderBottom:`1px solid ${C.g200}`,background:C.g50}}>
          <div></div>
          <div>Invoice ID</div>
          <div>Supplier</div>
          <div>Type</div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><Ic.Sparkle s={10}/>AI reason</div>
          <div style={{textAlign:"right"}}>Amount</div>
          <div>Severity</div>
          <div>Status</div>
          <div>Owner</div>
        </div>
        {filtered.map((e,i)=>{
          const sevColor=e.sev==="HIGH"?{bg:C.redL,t:C.red}:e.sev==="MED"?{bg:C.amberL,t:C.amber}:{bg:C.g100,t:C.g600};
          const statusColor=e.status==="Resolved"?{bg:C.greenL,t:C.green}:e.status==="In Progress"?{bg:C.blueXL,t:C.blueM}:{bg:C.g100,t:C.g600};
          return (
            <div key={i} onClick={()=>setSelected(e)} style={{display:"grid",gridTemplateColumns:"32px 130px 1fr 130px 1fr 100px 80px 90px 90px",padding:"12px 14px",fontSize:12,color:C.g700,borderBottom:i<filtered.length-1?`1px solid ${C.g100}`:"none",cursor:"pointer",alignItems:"center",background:bulkSelected.has(e.id)?C.blueBg:"transparent"}}
              onMouseEnter={ev=>ev.currentTarget.style.background=bulkSelected.has(e.id)?C.blueBg:C.g50}
              onMouseLeave={ev=>ev.currentTarget.style.background=bulkSelected.has(e.id)?C.blueBg:"transparent"}>
              <input type="checkbox" checked={bulkSelected.has(e.id)} onChange={ev=>{ev.stopPropagation();toggleBulk(e.id);}} onClick={ev=>ev.stopPropagation()} style={{cursor:"pointer"}}/>
              <div style={{fontFamily:"SF Mono,Menlo,monospace",fontSize:11,color:C.g900,fontWeight:500}}>{e.id}</div>
              <div style={{fontWeight:500,color:C.g900}}>{e.sup}</div>
              <div>{e.type}</div>
              <div style={{fontSize:11,color:C.g600,lineHeight:1.4,paddingRight:8}}>{e.reason.length>60?e.reason.substring(0,60)+"...":e.reason}</div>
              <div style={{textAlign:"right",fontWeight:600,color:C.g900}}>{e.amt}</div>
              <div><span style={{fontSize:10,padding:"2px 7px",borderRadius:8,background:sevColor.bg,color:sevColor.t,fontWeight:600}}>{e.sev}</span></div>
              <div><span style={{fontSize:10,padding:"2px 7px",borderRadius:8,background:statusColor.bg,color:statusColor.t,fontWeight:600}}>{e.status}</span></div>
              <div style={{fontSize:11,color:e.owner?C.g700:C.g400}}>{e.owner||"—"}</div>
            </div>
          );

              </div>
            </div>

function ArtifactsPage({businessId,period,runs,archivedConversations,highlightConvoId,clearHighlight}){
  const [open,setOpen]=useState("Jan 2026");
  const [filter,setFilter]=useState("all");
  const periodArt=ARTIFACTS.find(a=>a.per===open);

  // Static seeded conversations from ARTIFACTS data.
  const seededConvos=periodArt?.items.filter(it=>it.t==="Conversation")||[];
  // Live archived conversations from chat threads, formatted to match the existing shape.
  const periodToCtxKey={"Jan 2026":`${businessId||"TC-UAE-001"}__${period||"Q1 2026"}`};
  const liveArchived=((archivedConversations&&archivedConversations[periodToCtxKey[open]])||[]).map(c=>({
    id:c.id,
    n:c.title,
    t:"Conversation",
    date:new Date(c.archivedAt).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}),
    size:`${c.messageCount} msgs`,
    summary:`Archived from the chat panel · ${c.messageCount} message${c.messageCount===1?"":"s"} captured`,
    producedArtifacts:0,
    isLive:true
  }));
  // Live archived first (most recently archived at top), then seeded ones below.
  const conversations=[...liveArchived.slice().reverse(),...seededConvos];
  const outputs=periodArt?.items.filter(it=>it.t==="Output")||[];
  const inputs=periodArt?.items.filter(it=>it.t==="Input")||[];
  // Run history: pull from App-level runs map. Records group by the period folder name,
  // but App state keys by the top-bar's period selector (e.g. "Q1 2026"). For the prototype
  // we surface runs for the active selector context when the user opens the Jan 2026 folder
  // (Jan 2026 belongs to Q1 2026).
  const runHistory=(runs&&runs[periodToCtxKey[open]])||[];
  const totalCount=(periodArt?.count||0)+runHistory.length+liveArchived.length;

  // When the user navigates here from an archive notice, scroll to the highlighted item
  // and gently flash its background. Cleared via clearHighlight() after a few seconds.
  useEffect(()=>{
    if(!highlightConvoId) return;
    setFilter("conversations");
    const t=setTimeout(()=>{ if(clearHighlight) clearHighlight(); },4000);
    return ()=>clearTimeout(t);
  },[highlightConvoId]);

  return (
    <div style={{flex:1,overflow:"auto"}}>
      <PageHeader title="Records" subtitle="Audit-ready evidence record · Auto-populated by agents · Conversations, inputs, and outputs organized by return period"
        actions={<button style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${C.g200}`,fontSize:12,color:C.g700,background:C.white,display:"flex",alignItems:"center",gap:5}}><Ic.Download s={12}/>Export period bundle</button>}/>

      <div style={{padding:"18px 24px 0",display:"grid",gridTemplateColumns:"220px 1fr",gap:20}}>
        {/* Zone 1: Period folders sidebar */}
        <div>
          <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Periods · UAE</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {ARTIFACTS.map((a,i)=>{
            const isActive=open===a.per;
            const isOpen=a.per==="Jan 2026";
            return (
              <button key={i} onClick={()=>setOpen(a.per)} style={{width:"100%",height:56,padding:"0 12px",borderRadius:8,background:isActive?C.blueXXL:C.white,border:`1px solid ${isActive?C.blueXL:C.g200}`,display:"flex",alignItems:"center",gap:10,textAlign:"left"}}>
                <Ic.Folder s={16} c={isActive?C.blueM:C.g500}/>
                <div style={{flex:1,fontSize:13,fontWeight:600,color:C.g900}}>{a.per}</div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:10,color:C.g500}}>{a.count}</span>
                  <span style={{fontSize:9,padding:"2px 6px",borderRadius:6,background:isOpen?C.amberL:C.greenL,color:isOpen?C.amber:C.green,fontWeight:600}}>{isOpen?"OPEN":"FILED"}</span>
                </div>
              </button>
            );
          })}
          </div>
        </div>

        {/* Folder contents */}
        <div>
          {/* Zone 2: Period summary header */}
          <div style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{fontSize:18,fontWeight:700,color:C.g900}}>{open} · UAE VAT201</div>
              <span style={{fontSize:10,padding:"3px 10px",borderRadius:10,background:open==="Jan 2026"?C.amberL:C.greenL,color:open==="Jan 2026"?C.amber:C.green,fontWeight:600}}>{open==="Jan 2026"?"OPEN":"FILED"}</span>
            </div>
            <div style={{fontSize:11,color:C.g500,marginBottom:12}}>
              Period {open==="Jan 2026"?"open":"closed"} · Filing due 28 April · Owner Sara M.
            </div>
            {/* Filter chips */}
            <div style={{display:"flex",gap:6}}>
              {[
                {k:"all",l:`All ${totalCount}`},
                {k:"conversations",l:`Conversations ${conversations.length}`},
                {k:"outputs",l:`Outputs ${outputs.length}`},
                {k:"inputs",l:`Inputs ${inputs.length}`},
                {k:"runs",l:`Run history ${runHistory.length}`}
              ].map(f=>(
                <button key={f.k} onClick={()=>setFilter(f.k)} style={{padding:"6px 12px",borderRadius:7,fontSize:11,fontWeight:500,background:filter===f.k?C.blueXXL:C.white,color:filter===f.k?C.blueM:C.g600,border:`1px solid ${filter===f.k?C.blueXL:C.g200}`}}>
                  {f.l}
                </button>
              ))}
            </div>
          </div>

          {/* Zone 3: Records list grouped by type */}
          {(filter==="all"||filter==="conversations")&&conversations.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Conversations · {conversations.length}</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {conversations.map((it,i)=>{
                  const isHi=highlightConvoId&&it.id===highlightConvoId;
                  return (
                  <div key={it.id||i} style={{background:isHi?C.blueXXL:C.white,borderRadius:10,border:`1px solid ${isHi?C.blueXL:C.g200}`,padding:"18px 20px",display:"flex",alignItems:"flex-start",gap:14,cursor:"pointer",boxShadow:isHi?`0 0 0 3px ${C.blueXL}40`:"none",transition:"background 0.2s, box-shadow 0.2s"}}
                    onMouseEnter={e=>{if(!isHi) e.currentTarget.style.borderColor=C.blueXL;}}
                    onMouseLeave={e=>{if(!isHi) e.currentTarget.style.borderColor=C.g200;}}>
                    <Ic.Sparkle s={16} c={C.aiSpark}/>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <div style={{fontSize:13,fontWeight:600,color:C.g900}}>{it.n}</div>
                        {it.isLive&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:6,background:C.blueXXL,color:C.blueM,fontWeight:600}}>Archived from chat</span>}
                      </div>
                      <div style={{fontSize:11,color:C.g600,lineHeight:1.6,marginBottom:8}}>{it.summary}</div>
                      <div style={{display:"flex",alignItems:"center",gap:12,fontSize:10,color:C.g500}}>
                        <span>{it.date}</span>
                        {it.producedArtifacts>0&&<span style={{color:C.aiM,display:"flex",alignItems:"center",gap:4}}><Ic.Doc s={10} c={C.aiM}/>{it.producedArtifacts} artifact{it.producedArtifacts>1?"s":""} produced</span>}
                      </div>
                    </div>
                    <button style={{padding:"7px 14px",borderRadius:7,background:`linear-gradient(135deg,${C.blueB},${C.navy})`,color:C.white,fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                      <Ic.Sparkle s={11} c={C.white}/>{it.isLive?"View":"Resume"}
                    </button>
                  </div>
                  );
                })}
              </div>
            </div>
          )}

          {(filter==="all"||filter==="outputs")&&outputs.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Outputs · {outputs.length}</div>
              <div style={{background:C.white,borderRadius:10,border:`1px solid ${C.g200}`,overflow:"hidden"}}>
                {outputs.map((it,i)=>(
                  <div key={i} style={{padding:"13px 16px",borderBottom:i<outputs.length-1?`1px solid ${C.g100}`:"none",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.g50}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <Ic.Doc s={14} c={C.g500}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:500,color:C.g900,marginBottom:2}}>{it.n}</div>
                      <div style={{fontSize:10,color:C.g500}}>{it.date} · {it.size}</div>
                    </div>
                    <span style={{fontSize:10,padding:"2px 7px",borderRadius:8,background:C.greenBg,color:C.green,fontWeight:600}}>Output</span>
                    <button style={{padding:5}}><Ic.Download s={14} c={C.g500}/></button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {(filter==="all"||filter==="inputs")&&inputs.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Inputs · {inputs.length}</div>
              <div style={{background:C.white,borderRadius:10,border:`1px solid ${C.g200}`,overflow:"hidden"}}>
                {inputs.map((it,i)=>(
                  <div key={i} style={{padding:"11px 16px",borderBottom:i<inputs.length-1?`1px solid ${C.g100}`:"none",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.g50}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <Ic.Doc s={13} c={C.g400}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,fontWeight:500,color:C.g700,marginBottom:2}}>{it.n}</div>
                      <div style={{fontSize:10,color:C.g400}}>{it.date} · {it.size}</div>
                    </div>
                    <span style={{fontSize:9,padding:"2px 6px",borderRadius:6,background:C.blueXXL,color:C.blueM,fontWeight:600}}>Input</span>
                    <button style={{padding:4}}><Ic.Download s={13} c={C.g400}/></button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {(filter==="all"||filter==="runs")&&runHistory.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Run history · {runHistory.length}</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {runHistory.map((r,i)=>(
                  <div key={r.id||i} style={{background:C.white,borderRadius:10,border:`1px solid ${C.g200}`,padding:"14px 16px",display:"flex",alignItems:"flex-start",gap:12,cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=C.blueXL}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=C.g200}>
                    <div style={{width:32,height:32,borderRadius:8,background:r.kind==="rerun"?C.lilac:C.sky,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {r.kind==="rerun"?<Ic.Refresh s={14} c={r.kind==="rerun"?C.lilacT:C.skyT}/>:<Ic.Run s={12} c={C.skyT}/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:C.g900,marginBottom:2}}>{r.label} · {r.time}</div>
                      <div style={{fontSize:11,color:C.g600,lineHeight:1.5,marginBottom:r.chatKey?6:0}}>{r.summary}</div>
                      {r.chatKey&&(
                        <button style={{fontSize:10,color:C.blueM,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,padding:0}}>
                          <Ic.Sparkle s={10} c={C.blueM}/>View related chat
                        </button>
                      )}
                    </div>
                    <span style={{fontSize:9,padding:"2px 7px",borderRadius:8,background:r.kind==="rerun"?C.lilac:C.sky,color:r.kind==="rerun"?C.lilacT:C.skyT,fontWeight:600,flexShrink:0}}>
                      {r.kind==="rerun"?"Re-run":"Auto"}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
      <div style={{padding:24}}/>
    </div>
  );
}

          <button onClick={onClose} style={{width:"100%",padding:"12px",borderRadius:8,background:C.white,color:C.navy,fontSize:13,fontWeight:600,letterSpacing:"-0.01em"}}>
            Got it, dismiss
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ APP ============

function App(){
  const [page,setPage]=useState("landing");
  const [splitView,setSplitView]=useState(null);
  const [reconView,setReconView]=useState(null);
  const [chatPrompt,setChatPrompt]=useState(null);
  const [isFirstRun,setIsFirstRun]=useState(true);
  const [showOnboarding,setShowOnboarding]=useState(false);
  const [showPeriodModal,setShowPeriodModal]=useState(false);

  // ===== Global business + period context =====
  // In production these would come from localStorage / session ("last actively worked").
  // For the prototype we seed with Tech Corp UAE Holdings + Q1 2026 — i.e. the last
  // recon the user actively engaged with.
  const [businessId,setBusinessId]=useState("TC-UAE-001");
  const [period,setPeriod]=useState("Q1 2026");

  // ===== Chat thread store, keyed by businessId__period__reconRunId =====
  // Each recon has its own thread. Re-runs add system events to the same thread;
  // "New conversation" archives the current thread and bumps reconRunId.
  const [chatThreads,setChatThreads]=useState({});           // key -> messages[]
  const [reconRunIdMap,setReconRunIdMap]=useState({});       // "biz__period" -> current reconRunId
  // Archived conversations land here AND get surfaced in Records under the period folder.
  // Shape: { "biz__period": [{id, title, archivedAt, messageCount, messages, reconRunId}] }
  const [archivedConversations,setArchivedConversations]=useState({});
  const [runs,setRuns]=useState(SEED_RUNS);                  // "biz__period" -> [run entries]
  // Highlight target for Records (set when user clicks an archive notice).
  const [highlightConvoId,setHighlightConvoId]=useState(null);

  const ctxKey=`${businessId}__${period}`;
  const currentReconRunId=reconRunIdMap[ctxKey]||"run-1";
  const threadKey=`${ctxKey}__${currentReconRunId}`;

  // Mark a context as "actively worked on" so future loads default to it.
  // We just update the persisted defaults — the values already are these by definition,
  // so this is a no-op in the prototype but is the hook point for real persistence.
  const markActive=(biz,per)=>{
    // In production: localStorage.setItem('lastActive', JSON.stringify({biz, per}))
  };
  const handleSetBusinessId=(id)=>{setBusinessId(id);markActive(id,period);};
  const handleSetPeriod=(p)=>{setPeriod(p);markActive(businessId,p);};

  // Derive a conversation title from its messages: first user message (truncated to 60),
  // or "Untitled conversation" if the user never spoke.
  const deriveTitle=(messages)=>{
    if(!messages||messages.length===0) return "Untitled conversation";
    const firstUser=messages.find(m=>m.r==="user");
    if(!firstUser||!firstUser.t||!firstUser.t.trim()) return "Untitled conversation";
    const t=firstUser.t.trim();
    return t.length>60?t.slice(0,57).trim()+"…":t;
  };

  // Start a fresh conversation for the current recon. Archives the current thread to
  // Records (under the current period folder) and resets the chat to its default opening
  // message + a system note pointing back to the archive.
  const startNewConversation=()=>{
    const existing=chatThreads[threadKey];
    const archiveId=`convo-${Date.now()}`;
    if(existing&&existing.length>0){
      const title=deriveTitle(existing);
      const archivedAt=new Date().toISOString();
      setArchivedConversations(a=>({
        ...a,
        [ctxKey]:[
          ...(a[ctxKey]||[]),
          {id:archiveId,title,archivedAt,messageCount:existing.length,messages:existing,reconRunId:currentReconRunId}
        ]
      }));
    }
    // Bump the run id so the threadKey changes — the recon view will load a fresh thread.
    const next=`run-${Date.now()}`;
    const newKey=`${ctxKey}__${next}`;
    if(existing&&existing.length>0){
      // Pre-seed the new thread with: prominent archive-notice card (so the user clearly
      // sees what happened) → clean single welcome AI message. We deliberately skip the
      // full streaming history so this feels distinct from the initial recon thread.
      const archiveTitle=deriveTitle(existing);
      setChatThreads(t=>({
        ...t,
        [newKey]:[
          {r:"archive_notice",archiveId,archiveTitle,messageCount:existing.length,archivedAt:new Date().toISOString()},
          ...NEW_CONVERSATION_OPENING
        ]
      }));
    }else{
      // No prior conversation to archive — just the clean welcome.
      setChatThreads(t=>({...t,[newKey]:NEW_CONVERSATION_OPENING}));
    }
    setReconRunIdMap(m=>({...m,[ctxKey]:next}));
  };

  // Record a completed recon run (called from ReconReportView after a re-run finishes).
  const recordRun=(entry)=>{
    setRuns(r=>({...r,[ctxKey]:[entry,...(r[ctxKey]||[])]}));
  };

  // Navigate to Records, optionally highlighting a specific archived conversation.
  // Also dismisses any open recon overlay so the user actually sees the Records page —
  // otherwise the recon view sits on top and the navigation appears to do nothing.
  const openRecordsForConvo=(archiveId)=>{
    setHighlightConvoId(archiveId);
    setReconView(null);
    setPage("artifacts");
  };

  const handleChatExpand=(prompt)=>{ setSplitView(prompt); };

  useEffect(()=>{
    if(chatPrompt){
      setSplitView(chatPrompt);
      setChatPrompt(null);
    }
  },[chatPrompt]);

  const PAGES={
    mitigate:<MitigatePage setPage={setPage} setChatPrompt={setChatPrompt} setReconView={setReconView}/>,
    exceptions:<ExceptionsPage setPage={setPage}/>,
    report:<ReportPage onSplitView={setSplitView}/>,
    govern:<GovernPage/>,
    artifacts:<ArtifactsPage businessId={businessId} period={period} runs={runs} archivedConversations={archivedConversations} highlightConvoId={highlightConvoId} clearHighlight={()=>setHighlightConvoId(null)}/>,
    agents:<AgentsPage/>
  };

  if(page==="landing"){
    return <LandingPage onOpenProduct={(p)=>{setPage(p);setShowOnboarding(true);}}/>;
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:C.bg}}>
      <TopNav page={page} setPage={setPage} isFirstRun={isFirstRun} onShowOnboarding={()=>setShowOnboarding(true)}
        businessId={businessId} setBusinessId={handleSetBusinessId} period={period} setPeriod={handleSetPeriod}
        onOpenPeriodModal={()=>setShowPeriodModal(true)}/>
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <SideNav page={page} setPage={setPage} onResetOnboarding={()=>setIsFirstRun(true)}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <AIWorkspaceBar page={page} onExpand={handleChatExpand} businessId={businessId} period={period}/>
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            {PAGES[page]}
          </div>
        </div>
      </div>
      {splitView&&<SplitView prompt={splitView} onClose={()=>setSplitView(null)}/>}
      {reconView&&<ReconReportView type={reconView.type} initialState={reconView.state||"populated"} onClose={()=>setReconView(null)}
        businessId={businessId} period={period} threadKey={threadKey}
        chatThreads={chatThreads} setChatThreads={setChatThreads}
        startNewConversation={startNewConversation} recordRun={recordRun}
        archivedConversations={archivedConversations[ctxKey]||[]}
        openRecordsForConvo={openRecordsForConvo}/>}
      {showPeriodModal&&<PeriodModal businessId={businessId} period={period} setBusinessId={handleSetBusinessId} setPeriod={handleSetPeriod} runs={runs}
        onClose={()=>setShowPeriodModal(false)}
        onOpenRecon={()=>setReconView({type:"Sales",state:"populated"})}
        onStartNewRecon={()=>setReconView({type:"Sales",state:"setup"})}/>}
      {showOnboarding&&<OnboardingPanel onClose={()=>{setShowOnboarding(false);setIsFirstRun(false);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
